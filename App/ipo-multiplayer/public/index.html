<!DOCTYPE html>
<html>
<head>
    <title>IPO Multiplayer Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>IPO Chart Builder (Multiplayer)</h1>

<div class="container">
    <div class="column" id="input">
        <h2>Input</h2>
    </div>

    <div class="column" id="process">
        <h2>Process</h2>
    </div>

    <div class="column" id="output">
        <h2>Output</h2>
    </div>
</div>

<div class="buttons">
<button onclick="addBox('input')">+ Input</button>
<button onclick="addBox('process')">+ Process</button>
<button onclick="addBox('output')">+ Output</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="script.js"></script>

</body>
</html>
